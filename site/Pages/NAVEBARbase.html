<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azzy Store</title>
    <link rel="icon" href="/images/icone.png" type="image/png">    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: 'Poppins', sans-serif;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            padding: 0 40px;
            background: #e63946;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.18);
        }
        .logo {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            height: 100%;
            text-decoration: none;
        }
        .logo-img-wrap {
            position: relative;
            display: flex;
            align-items: flex-end;
            height: 70px;
            flex-shrink: 0;
        }
        .logo-img-wrap img {
            display: block;
            width: auto;
            height: 70px;
            object-fit: contain;
            object-position: bottom;
            transition: opacity 0.25s ease;
        }
        .img-hover {
            position: absolute;
            left: 0;
            bottom: 0;
            opacity: 0;
        }
        .logo:hover .img-default {
            opacity: 0;
        }
        .logo:hover .img-hover {
            opacity: 1;
        }
        .logo-text {
            padding-bottom: 16px;
            color: #1a1a1a;
            font-family: 'Playfair Display', serif;
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .nav-right {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .github-small-box {
            position: fixed;
            top: 80px;
            right: 25px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            z-index: 95;
            font-size: 0.82rem;
            transition: top 0.4s ease;
            white-space: nowrap;
        }
        .github-small-box img {
            width: 26px;
            height: 26px;
            border-radius: 4px;
        }
        .github-small-box .version-text {
            font-weight: 600;
            color: #000000;
        }
        .github-small-box .link {
            color: #e63946;
            text-decoration: none;
            font-size: 0.78rem;
            margin-left: 4px;
        }

        .categories-wrapper {
            position: sticky;
            top: 70px;
            z-index: 99;
            transform: translateY(0);
            transition: transform 0.35s ease;
        }
        .categories-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 46px;
            padding: 0 40px;
            background: #ffffff;
            border-bottom: 2px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
        }
        .categories-bar a {
            padding: 6px 16px;
            border-radius: 20px;
            color: #333333;
            text-decoration: none;
            white-space: nowrap;
            font-size: 0.88rem;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }
        .categories-bar a:hover {
            background: #e63946;
            color: #ffffff;
        }
        .separator {
            color: #dddddd;
            user-select: none;
        }

        .pull-tab {
            position: sticky;
            top: 70px;
            z-index: 97;
            display: flex;
            justify-content: center;
            height: 0;
            pointer-events: none;
        }
        .pull-btn {
            display: none;
            align-items: center;
            justify-content: center;
            padding: 3px 18px 5px;
            border: 2px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 20px 20px;
            background: #ffffff;
            cursor: pointer;
            pointer-events: all;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: background 0.2s;
        }
        .pull-btn:hover {
            background: #fafafa;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 40px;
            padding: 0 16px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            transition: box-shadow 0.2s;
        }
        .search-wrapper:focus-within {
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.22);
        }
        .search-icon {
            width: 15px;
            height: 15px;
            fill: none;
            stroke: #999999;
            flex-shrink: 0;
        }
        .search-input {
            width: 200px;
            border: none;
            outline: none;
            background: transparent;
            color: #333333;
            font-size: 0.88rem;
            font-family: inherit;
        }
        .search-input::placeholder {
            color: #aaaaaa;
        }
        .support-btn, .cart-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .support-btn:hover, .cart-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.08);
        }
        .support-icon, .cart-icon {
            width: 19px;
            height: 19px;
            fill: none;
            stroke: #ffffff;
        }
        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #1a1a1a;
            color: #ffffff;
            font-size: 0.6rem;
            font-weight: 600;
        }
        .support-popup {
            position: absolute;
            top: 58px;
            right: 58px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            min-width: 230px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.16);
            transition: all 0.22s ease;
            z-index: 999;
        }

        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 40px;
            text-align: center;
            color: #444;
        }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="HomePage.html">
        <div class="logo-img-wrap">
            <img class="img-default" src="../images/Azzylogo1.png" alt="Logo padrão">
            <img class="img-hover" src="../images/Azzylogo2.png" alt="Logo hover">
        </div>
        <span class="logo-text">AZZY STORE</span>
    </a>
    <div class="nav-right">
        <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <label>
                <input class="search-input" type="text" placeholder="Buscar produtos...">
            </label>
        </div>
        <button class="support-btn" id="supportBtn" type="button" title="Atendimento">
            <svg class="support-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
        </button>
        <div class="support-popup" id="supportPopup">
            <strong>Atendimento ao Cliente</strong>
            <p>azzystore94@gmail.com</p>
        </div>
        <button class="cart-btn" id="cartBtn" type="button">
            <svg class="cart-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-badge" id="cartCount">0</span>
        </button>
    </div>
</nav>

<div class="categories-wrapper" id="categoriesWrapper">
    <div class="categories-bar">
        <span class="separator">|</span>
        <a href="roupas.html">Roupas</a>
        <span class="separator">|</span>
        <a href="canecas.html">Canecas</a>
        <span class="separator">|</span>
        <a href="adesivos.html">Adesivos</a>
        <span class="separator">|</span>
        <a href="pins.html">Pins</a>
        <span class="separator">|</span>
        <a href="pelucias.html">Pelúcias</a>
    </div>
</div>

<div class="github-small-box" id="githubBox">
    <img src="/images/Carrocel/azzygit.png" alt="GitHub">
    <div>
        <span class="version-text">GITHUB versão! Em breve</span>
        <br>
        <a href="azzystore.duckdns.org/" target="_blank" class="link">azzystore.duckdns.org</a>
    </div>
</div>

<div class="pull-tab">
    <button class="pull-btn" id="pullBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </button>
</div>
<script src="products.js"></script>
<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function updateCartCount() {
        const countEl = document.getElementById('cartCount');
        if (countEl) countEl.textContent = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    }

    const wrapper = document.getElementById('categoriesWrapper');
    const pullBtn = document.getElementById('pullBtn');
    const githubBox = document.getElementById('githubBox');
    let isHidden = false;

    function updateGitHubPosition() {
        if (githubBox) githubBox.style.top = isHidden ? '80px' : '126px';
    }
    updateGitHubPosition();

    if (wrapper && pullBtn && githubBox) {
        window.addEventListener('scroll', () => {
            const current = window.scrollY;
            if (current > 80 && !isHidden) {
                wrapper.style.transform = 'translateY(-100%)';
                pullBtn.style.display = 'flex';
                isHidden = true;
                updateGitHubPosition();
            } else if (current <= 80 && isHidden) {
                wrapper.style.transform = 'translateY(0)';
                pullBtn.style.display = 'none';
                isHidden = false;
                updateGitHubPosition();
            }
        });

        pullBtn.addEventListener('click', () => {
            wrapper.style.transform = 'translateY(0)';
            pullBtn.style.display = 'none';
            isHidden = false;
            updateGitHubPosition();
        });
    }

    const supportBtn = document.getElementById('supportBtn');
    const supportPopup = document.getElementById('supportPopup');
    let popupVisible = false;

    supportBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        popupVisible = !popupVisible;
        supportPopup.style.opacity = popupVisible ? '1' : '0';
        supportPopup.style.visibility = popupVisible ? 'visible' : 'hidden';
        supportPopup.style.transform = popupVisible ? 'translateY(0)' : 'translateY(-8px)';
    });

    document.addEventListener('click', () => {
        if (popupVisible) {
            popupVisible = false;
            supportPopup.style.opacity = '0';
            supportPopup.style.visibility = 'hidden';
            supportPopup.style.transform = 'translateY(-8px)';
        }
    });

    window.onload = () => {
        updateCartCount();
    };
</script>
</body>
</html>
